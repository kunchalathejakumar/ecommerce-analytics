version: 2

models:
  - name: mart_sales_daily
    description: Daily sales performance segmented by shipping region and customer segment.
    tests:
      - dbt_utils.expression_is_true:
          expression: "total_revenue >= 0"
    columns:
      - name: order_date
        tests:
          - not_null
      - name: order_count
        tests:
          - not_null
      - name: total_revenue
        tests:
          - not_null

  - name: mart_customer_summary
    description: Customer-level rollup metrics across orders and order items.
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: lifetime_value
        tests:
          - not_null
      - name: total_orders
        tests:
          - not_null

  - name: mart_product_performance
    description: Product-level performance metrics across all order items.
    columns:
      - name: product_id
        tests:
          - not_null
          - unique
      - name: total_revenue
        tests:
          - not_null
      - name: total_profit
        tests:
          - not_null

