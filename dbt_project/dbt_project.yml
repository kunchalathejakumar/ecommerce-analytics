name: ecommerce
version: "1.0.0"
config-version: 2

profile: ecommerce

model-paths:
  - models

analysis-paths:
  - analyses

test-paths:
  - tests

macro-paths:
  - macros

target-path: target
clean-targets:
  - target
  - dbt_packages

models:
  ecommerce:
    staging:
      +materialized: view
      +schema: staging

    intermediate:
      +materialized: view
      +schema: intermediate

    marts:
      +materialized: table
      +schema: marts
