name: dbt CI

on:
  pull_request:
    branches:
      - main

permissions:
  pull-requests: write
  contents: read

# ---------------------------------------------------------------------------
# Job-level env: dbt profiles.yml reads these via env_var().
# POSTGRES_HOST / POSTGRES_USER / POSTGRES_PASSWORD come from GitHub Secrets.
# POSTGRES_PORT overrides the default 5433 in profiles.yml to match the
# service container which listens on 5432.
# ---------------------------------------------------------------------------
jobs:
  dbt-ci:
    name: dbt Build & Test
    runs-on: ubuntu-latest

    env:
      POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ecommerce
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

    # -----------------------------------------------------------------------
    # PostgreSQL 15 service container — credentials mirror the secrets above.
    # -----------------------------------------------------------------------
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ecommerce
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Python 3.13 (matches local dev environment)
      # -----------------------------------------------------------------------
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # -----------------------------------------------------------------------
      # 3. Cache pip to speed up subsequent runs
      # -----------------------------------------------------------------------
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-dbt-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-dbt-

      # -----------------------------------------------------------------------
      # 4. Install dbt-postgres and psycopg2-binary
      # -----------------------------------------------------------------------
      - name: Install dbt-postgres and psycopg2-binary
        run: pip install dbt-postgres==1.10.0 psycopg2-binary==2.9.11

      # -----------------------------------------------------------------------
      # 5. Install dbt packages (dbt_utils)
      # -----------------------------------------------------------------------
      - name: Install dbt packages
        working-directory: dbt_project
        run: dbt deps --profiles-dir .

      # -----------------------------------------------------------------------
      # 6. Create the staging, intermediate, and marts schemas plus all four
      #    source tables that the staging models read from.
      #    psql uses the PGHOST / PGPORT / PGUSER / PGPASSWORD / PGDATABASE
      #    standard environment variables set at the job level.
      # -----------------------------------------------------------------------
      - name: Create schemas and source tables
        env:
          PGHOST: ${{ secrets.POSTGRES_HOST }}
          PGPORT: "5432"
          PGDATABASE: ecommerce
          PGUSER: ${{ secrets.POSTGRES_USER }}
          PGPASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          psql <<'EOSQL'
          CREATE SCHEMA IF NOT EXISTS staging;
          CREATE SCHEMA IF NOT EXISTS intermediate;
          CREATE SCHEMA IF NOT EXISTS marts;

          CREATE TABLE IF NOT EXISTS staging.customers (
            customer_id  INTEGER,
            name         TEXT,
            email        TEXT,
            segment      TEXT,
            country      TEXT
          );

          CREATE TABLE IF NOT EXISTS staging.orders (
            order_id        INTEGER,
            customer_id     INTEGER,
            date_ordered    DATE,
            status          TEXT,
            total_amount    NUMERIC(12, 2),
            shipping_region TEXT
          );

          CREATE TABLE IF NOT EXISTS staging.products (
            product_id  INTEGER,
            name        TEXT,
            category    TEXT,
            list_price  NUMERIC(12, 2),
            cost_price  NUMERIC(12, 2)
          );

          CREATE TABLE IF NOT EXISTS staging.order_items (
            item_id     INTEGER,
            order_id    INTEGER,
            product_id  INTEGER,
            quantity    INTEGER,
            unit_price  NUMERIC(12, 2),
            discount    NUMERIC(8, 4)
          );
          EOSQL

      # -----------------------------------------------------------------------
      # 7. Generate small, self-contained CI fixture data and load it directly
      #    into the staging schema. No local CSV files required — the data/
      #    folder is gitignored and never pushed to GitHub.
      #
      #    Volumes are intentionally tiny (CI speed):
      #      50 customers · 30 products · 60 orders · 120 order_items
      #
      #    All foreign keys are kept consistent so dbt relationship tests pass.
      # -----------------------------------------------------------------------
      - name: Generate and load CI seed data
        env:
          PGHOST: ${{ secrets.POSTGRES_HOST }}
          PGPORT: "5432"
          PGDATABASE: ecommerce
          PGUSER: ${{ secrets.POSTGRES_USER }}
          PGPASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          python - <<'PYEOF'
          import os, random, psycopg2
          from datetime import datetime, timedelta

          random.seed(42)

          conn = psycopg2.connect(
              host=os.environ["PGHOST"],
              port=os.environ["PGPORT"],
              user=os.environ["PGUSER"],
              password=os.environ["PGPASSWORD"],
              dbname=os.environ["PGDATABASE"],
          )
          cur = conn.cursor()

          # --- customers (50 rows) -------------------------------------------
          segments = ["retail", "wholesale", "online", "enterprise"]
          customers = [
              (i, f"Test User {i}", f"user{i}@example.com",
               segments[i % len(segments)], "United States")
              for i in range(1, 51)
          ]
          cur.executemany(
              "INSERT INTO staging.customers VALUES (%s,%s,%s,%s,%s)",
              customers,
          )

          # --- products (30 rows) --------------------------------------------
          categories = ["Electronics", "Home", "Clothing", "Sports", "Books"]
          products = []
          for i in range(1, 31):
              list_price = round(10 + i * 6.5, 2)
              cost_price = round(list_price * 0.6, 2)
              products.append((i, f"Product {i}", categories[i % len(categories)],
                               list_price, cost_price))
          cur.executemany(
              "INSERT INTO staging.products VALUES (%s,%s,%s,%s,%s)",
              products,
          )

          # --- orders (60 rows) — all customer_ids in 1–50 -------------------
          base_date = datetime(2025, 1, 1)
          statuses = ["completed", "shipped"]
          regions  = ["North", "South", "East", "West", "Central"]
          orders = [
              (i,
               (i % 50) + 1,                                   # customer_id 1–50
               (base_date + timedelta(days=i * 6)).strftime("%Y-%m-%d"),
               statuses[i % 2],
               round(20 + i * 7.3, 2),
               regions[i % len(regions)])
              for i in range(1, 61)
          ]
          cur.executemany(
              "INSERT INTO staging.orders VALUES (%s,%s,%s,%s,%s,%s)",
              orders,
          )

          # --- order_items (120 rows, 2 per order) ---------------------------
          order_items = [
              (i,
               ((i - 1) // 2) + 1,                             # order_id 1–60
               (i % 30) + 1,                                   # product_id 1–30
               (i % 5) + 1,                                    # quantity 1–5
               round(5 + i * 3.1, 2),                          # unit_price
               round((i % 5) * 0.05, 4))                       # discount 0–0.20
              for i in range(1, 121)
          ]
          cur.executemany(
              "INSERT INTO staging.order_items VALUES (%s,%s,%s,%s,%s,%s)",
              order_items,
          )

          conn.commit()
          cur.close()
          conn.close()
          print("CI seed data loaded: 50 customers, 30 products, 60 orders, 120 order_items.")
          PYEOF

      # -----------------------------------------------------------------------
      # 8. Verify the dbt connection to the service container
      # -----------------------------------------------------------------------
      - name: dbt debug
        working-directory: dbt_project
        run: dbt debug --profiles-dir .

      # -----------------------------------------------------------------------
      # 9. Build the staging layer
      # -----------------------------------------------------------------------
      - name: dbt run — staging
        working-directory: dbt_project
        run: dbt run --select staging --profiles-dir .

      # -----------------------------------------------------------------------
      # 10. Run all tests (continue so we can post results even on failure)
      # -----------------------------------------------------------------------
      - name: dbt test
        id: dbt_test
        working-directory: dbt_project
        continue-on-error: true
        run: dbt test --profiles-dir . --store-failures

      # -----------------------------------------------------------------------
      # 11. Parse run_results.json and write a markdown summary to GITHUB_OUTPUT
      # -----------------------------------------------------------------------
      - name: Parse dbt test results
        id: parse_results
        if: always()
        run: |
          python - <<'PYEOF'
          import json, os, sys

          results_path = "dbt_project/target/run_results.json"
          if not os.path.exists(results_path):
              summary = "No dbt test results found — run may have failed before tests executed."
              with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
                  fh.write(f"summary<<DELIM\n{summary}\nDELIM\n")
                  fh.write("outcome=error\n")
              sys.exit(0)

          with open(results_path) as f:
              data = json.load(f)

          # Only count test nodes, not model run results
          results = [
              r for r in data.get("results", [])
              if r.get("unique_id", "").startswith("test.")
          ]

          passed  = sum(1 for r in results if r["status"] == "pass")
          failed  = sum(1 for r in results if r["status"] == "fail")
          warned  = sum(1 for r in results if r["status"] == "warn")
          errored = sum(1 for r in results if r["status"] == "error")
          total   = len(results)

          header_icon = "✅" if (failed == 0 and errored == 0) else "❌"
          lines = [
              f"## {header_icon} dbt Test Results",
              "",
              "| Status     | Count |",
              "|------------|-------|",
              f"| ✅ Passed   | {passed}  |",
              f"| ❌ Failed   | {failed}  |",
              f"| ⚠️  Warned   | {warned}  |",
              f"| 🔴 Errored  | {errored} |",
              f"| **Total**  | **{total}** |",
              "",
          ]

          if failed > 0 or errored > 0:
              lines += ["### Failing Tests", ""]
              for r in results:
                  if r["status"] in ("fail", "error"):
                      name = r["unique_id"].split(".")[-1]
                      lines.append(f"- `{name}` — **{r['status']}**")

          summary = "\n".join(lines)
          outcome = "failure" if (failed > 0 or errored > 0) else "success"

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"summary<<DELIM\n{summary}\nDELIM\n")
              fh.write(f"outcome={outcome}\n")

          print(summary)
          PYEOF

      # -----------------------------------------------------------------------
      # 12. Post (or update) a PR comment with the test-results table.
      #     Uses SUMMARY env var to avoid backtick/interpolation issues.
      # -----------------------------------------------------------------------
      - name: Post PR comment with test results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          SUMMARY: ${{ steps.parse_results.outputs.summary }}
        with:
          script: |
            const summary = process.env.SUMMARY || "_No summary available._";
            const runUrl  = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              summary,
              "",
              `> 🔗 [View full run logs](${runUrl})`,
            ].join("\n");

            // Upsert: update existing bot comment if present, otherwise create new one.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(
              c => c.user.type === "Bot" && c.body.includes("dbt Test Results")
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing comment #${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info("Created new PR comment.");
            }

      # -----------------------------------------------------------------------
      # 13. Fail the job explicitly if dbt tests failed (step 10 used
      #     continue-on-error so we could always reach the comment step).
      # -----------------------------------------------------------------------
      - name: Fail job if dbt tests failed
        if: steps.dbt_test.outcome == 'failure'
        run: |
          echo "::error::dbt tests reported failures. See PR comment for details."
          exit 1
