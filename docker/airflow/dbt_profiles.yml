ecommerce:
  target: dev
  outputs:
    dev:
      type: postgres
      host: postgres
      port: 5432
      user:     "{{ env_var('POSTGRES_USER', 'admin') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      dbname:   "{{ env_var('POSTGRES_DB', 'ecommerce') }}"
      schema: marts
      threads: 4
